<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E0E11">
<title>Habit Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="light"]{
    --bg:#F6F6F4; --surface:#FFFFFF; --surface-2:#FBFBFA;
    --text:#15151A; --muted:#76767E; --faint:#A6A6AD;
    --border:#EAEAE6; --border-strong:#DEDED9;
    --accent:#5B57E0; --accent-weak:#ECEBFB;
    --ring-track:#ECECEA; --shadow:0 1px 2px rgba(20,20,30,.04),0 6px 20px rgba(20,20,30,.05);
    --flame:#E08A4B;
  }
  :root[data-theme="dark"]{
    --bg:#0E0E11; --surface:#18181C; --surface-2:#1E1E23;
    --text:#F2F2F4; --muted:#9A9AA3; --faint:#6A6A72;
    --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.14);
    --accent:#827DF2; --accent-weak:rgba(130,125,242,.16);
    --ring-track:rgba(255,255,255,.10); --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    --flame:#E89B5C;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center;
    transition:background .3s,color .3s;
  }
  .app{width:100%;max-width:430px;min-height:100vh;padding:20px 18px 104px;display:flex;flex-direction:column;gap:20px}
  .num{font-family:'Space Grotesk',sans-serif;font-feature-settings:"tnum"}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between}
  .brand{font-family:'Space Grotesk';font-weight:600;font-size:17px;letter-spacing:-.01em}
  .brand span{color:var(--accent)}
  .theme-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--surface);
    color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:16px;transition:transform .15s,background .2s,color .2s}
  .theme-btn:active{transform:scale(.92)}

  /* hero */
  .hero{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:20px;display:flex;align-items:center;gap:20px;box-shadow:var(--shadow)}
  .ring-wrap{position:relative;width:84px;height:84px;flex-shrink:0}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-wrap .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
  .ring-wrap .center b{font-family:'Space Grotesk';font-size:20px;line-height:1;font-weight:600}
  .ring-wrap .center small{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.04em}
  .hero-info{flex:1;min-width:0}
  .hero-lvl{display:flex;align-items:baseline;gap:8px}
  .hero-lvl b{font-family:'Space Grotesk';font-size:26px;font-weight:600;letter-spacing:-.01em}
  .hero-lvl span{font-size:13px;color:var(--muted)}
  .hero-title{font-size:13px;color:var(--muted);margin-top:1px}
  .xpbar{height:6px;background:var(--ring-track);border-radius:99px;margin-top:11px;overflow:hidden}
  .xpbar i{display:block;height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .6s cubic-bezier(.3,.9,.3,1)}
  .hero-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
  .hero-foot .xp{font-size:11.5px;color:var(--faint)}
  .streak-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);font-weight:500}
  .streak-chip b{color:var(--flame);font-weight:600}

  /* sections */
  .row-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
  .row-head h2{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.02em}
  .icon-btn{width:32px;height:30px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:13px;transition:background .2s,color .2s}
  .icon-btn.on{background:var(--text);color:var(--bg);border-color:var(--text)}

  /* habit */
  .view{display:none;flex-direction:column;gap:14px}
  .view.active{display:flex}
  .list{display:flex;flex-direction:column;gap:10px}
  .habit{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px;position:relative}
  .h-top{display:flex;align-items:center;gap:13px}
  .h-emoji{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;background:var(--c-weak);flex-shrink:0}
  .h-info{flex:1;min-width:0}
  .h-info h3{font-size:15.5px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .h-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:7px;align-items:center}
  .h-meta .fire{color:var(--flame);font-weight:600}

  .check{width:44px;height:44px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid var(--border-strong);
    background:transparent;display:grid;place-items:center;transition:transform .18s,background .2s,border-color .2s}
  .check svg{width:21px;height:21px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:26;stroke-dashoffset:26;transition:stroke-dashoffset .28s ease .04s}
  .check.done{background:var(--c);border-color:var(--c)}
  .check.done svg{stroke-dashoffset:0}
  .check:active{transform:scale(.9)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
  .check.pop{animation:pop .3s ease}

  .counter{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .cbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border-strong);background:var(--surface-2);
    color:var(--text);font-size:19px;cursor:pointer;display:grid;place-items:center;line-height:1;transition:transform .12s}
  .cbtn:active{transform:scale(.9)}
  .cbtn.plus{background:var(--c);border-color:var(--c);color:#fff}
  .cval{font-family:'Space Grotesk';min-width:46px;text-align:center;font-size:12px;color:var(--muted)}
  .cval b{font-size:17px;display:block;line-height:1;color:var(--text)}
  .cval.full b{color:var(--c)}

  .week{display:flex;justify-content:space-between;gap:5px;margin-top:13px}
  .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
  .day span{font-size:9px;color:var(--faint);font-weight:500;letter-spacing:.03em}
  .dot{width:100%;aspect-ratio:1;max-width:26px;border-radius:7px;background:var(--ring-track)}
  .dot.on{background:var(--c)}
  .day.today .dot{box-shadow:0 0 0 2px var(--surface),0 0 0 3.5px var(--c)}

  .del{position:absolute;top:9px;right:9px;width:26px;height:26px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface);color:#E5484D;font-size:15px;cursor:pointer;display:none;place-items:center;z-index:2}
  body.editing .del{display:grid}
  body.editing .check,body.editing .counter{opacity:.3;pointer-events:none}

  /* drag to reorder */
  .habit{cursor:grab;transition:transform .18s cubic-bezier(.2,.7,.3,1)}
  .habit.dragging{transition:none;cursor:grabbing;z-index:20;opacity:.97;box-shadow:0 12px 30px rgba(0,0,0,.28)}
  body.reordering{user-select:none;-webkit-user-select:none}
  .habit .check,.habit .cbtn{cursor:pointer}

  .add{border:1px dashed var(--border-strong);background:transparent;color:var(--muted);border-radius:16px;
    padding:14px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:border-color .2s,color .2s}
  .add:active{border-color:var(--accent);color:var(--accent)}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:10px}
  .empty p{font-size:14px;line-height:1.5;max-width:230px;margin:0 auto}

  /* stats */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px}
  .stat .k{font-size:12px;color:var(--muted)}
  .stat .v{font-family:'Space Grotesk';font-size:27px;font-weight:600;margin-top:5px;letter-spacing:-.01em}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:500}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:17px}
  .panel h4{font-size:12.5px;color:var(--muted);margin-bottom:15px;font-weight:600}
  .chart{display:flex;align-items:flex-end;gap:4px;height:108px}
  .chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
  .chart .bar{width:100%;max-width:13px;border-radius:4px;background:var(--accent);min-height:3px;opacity:.85;transition:height .5s}
  .chart .col small{font-size:8px;color:var(--faint)}
  .ratebars{display:flex;flex-direction:column;gap:13px}
  .rate{display:flex;align-items:center;gap:11px}
  .rate .rl{font-size:13px;width:104px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rate .rt{flex:1;height:7px;background:var(--ring-track);border-radius:99px;overflow:hidden}
  .rate .rt i{display:block;height:100%;border-radius:99px;background:var(--c)}
  .rate .rp{font-family:'Space Grotesk';font-size:12px;color:var(--muted);width:32px;text-align:right}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-head button{background:var(--surface-2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:9px;font-size:15px;cursor:pointer}
  .cal-head .m{font-family:'Space Grotesk';font-size:15px;font-weight:600}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal .wd{font-size:9.5px;color:var(--faint);text-align:center;padding-bottom:3px;font-weight:500}
  .cell{aspect-ratio:1;border-radius:8px;background:var(--ring-track);display:grid;place-items:center;font-size:10.5px;color:var(--faint)}
  .cell.lv1{background:var(--accent-weak);color:var(--accent)}
  .cell.lv2{background:color-mix(in srgb,var(--accent) 38%,transparent);color:var(--accent)}
  .cell.lv3{background:color-mix(in srgb,var(--accent) 65%,transparent);color:#fff}
  .cell.lv4{background:var(--accent);color:#fff}
  .cell.today{box-shadow:0 0 0 1.5px var(--text)}
  .legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:14px;font-size:10px;color:var(--faint)}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}

  /* badges */
  .badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .badge{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;position:relative}
  .badge.locked{opacity:.55}
  .badge .medal{width:50px;height:50px;border-radius:50%;margin:0 auto 9px;display:grid;place-items:center;font-size:23px;
    background:var(--surface-2);border:1px solid var(--border)}
  .badge.unlocked .medal{background:var(--accent-weak);border-color:transparent}
  .badge h5{font-size:12.5px;font-weight:600;margin-bottom:3px;letter-spacing:-.01em}
  .badge p{font-size:10px;color:var(--muted);line-height:1.35}
  .badge .lock{position:absolute;top:10px;right:11px;font-size:11px;color:var(--faint)}

  /* nav */
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;z-index:8;
    background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(16px);border-top:1px solid var(--border);
    display:flex;padding:9px 8px calc(9px + env(safe-area-inset-bottom))}
  .nav button{flex:1;background:none;border:none;color:var(--faint);cursor:pointer;padding:5px 0;
    display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;font-size:10px;font-weight:500;transition:color .15s}
  .nav button .ic{font-size:18px;line-height:1}
  .nav button.active{color:var(--accent)}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(10,10,15,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:20}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;max-width:430px;margin:0 auto;background:var(--surface);
    border:1px solid var(--border);border-bottom:none;border-radius:22px 22px 0 0;padding:22px 18px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(110%);transition:transform .3s cubic-bezier(.3,.9,.3,1);max-height:90vh;overflow-y:auto}
  .sheet.show{transform:translateY(0)}
  .sheet h2{font-family:'Space Grotesk';font-size:18px;font-weight:600;margin-bottom:18px}
  .seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:18px}
  .seg button{flex:1;border:none;background:none;color:var(--muted);padding:9px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s,color .2s}
  .seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
  .field{margin-bottom:17px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500}
  .field input{width:100%;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:12px;padding:12px 14px;
    font-family:inherit;font-size:16px;font-weight:500;color:var(--text);outline:none;transition:border-color .15s}
  .field input:focus{border-color:var(--accent)}
  .row2{display:flex;gap:10px}.row2 .field{flex:1}
  .picker{display:flex;flex-wrap:wrap;gap:8px}
  .pick{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);cursor:pointer;display:grid;place-items:center;font-size:19px;background:var(--surface-2)}
  .pick.sel{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent)}
  .swatch{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer}
  .swatch.sel{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--text)}
  .save{width:100%;border:none;border-radius:13px;padding:15px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;color:#fff;background:var(--accent);margin-top:4px;transition:transform .15s,opacity .2s}
  .save:active{transform:scale(.98)}.save:disabled{opacity:.4}
  #countFields{display:none}#countFields.show{display:flex}

  /* celebration */
  .cele{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;pointer-events:none;padding:24px}
  .cele.show{display:flex}
  .cele-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:26px 30px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.25);transform:scale(.7);opacity:0;transition:transform .4s cubic-bezier(.3,1.3,.5,1),opacity .3s}
  .cele.show .cele-card{transform:scale(1);opacity:1}
  .cele-card .ce{font-size:46px;margin-bottom:8px}
  .cele-card h3{font-family:'Space Grotesk';font-size:19px;font-weight:600}
  .cele-card p{color:var(--muted);font-size:13px;margin-top:4px}
  .confetti{position:fixed;top:-12px;width:8px;height:11px;z-index:29;pointer-events:none;border-radius:2px}
  @keyframes fall{to{transform:translateY(105vh) rotate(680deg);opacity:0}}
  .xpfloat{position:fixed;z-index:25;font-family:'Space Grotesk';font-weight:600;color:var(--accent);pointer-events:none;font-size:15px;animation:floatup 1s ease forwards}
  @keyframes floatup{0%{opacity:0;transform:translateY(0)}25%{opacity:1}100%{opacity:0;transform:translateY(-40px)}}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">Habit<span>·</span>Quest</div>
      <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">◐</button>
    </div>

    <!-- hero -->
    <div class="hero">
      <div class="ring-wrap">
        <svg width="84" height="84" viewBox="0 0 84 84">
          <circle cx="42" cy="42" r="37" fill="none" stroke="var(--ring-track)" stroke-width="7"/>
          <circle id="todayRing" cx="42" cy="42" r="37" fill="none" stroke="var(--accent)" stroke-width="7" stroke-linecap="round" stroke-dasharray="232.5" stroke-dashoffset="232.5"/>
        </svg>
        <div class="center"><b id="ringCount">0/0</b><small>today</small></div>
      </div>
      <div class="hero-info">
        <div class="hero-lvl"><b class="num" id="lvlNum">1</b><span id="lvlWord">Level 1</span></div>
        <div class="hero-title" id="lvlTitle">Rookie</div>
        <div class="xpbar"><i id="xpFill"></i></div>
        <div class="hero-foot">
          <span class="xp num" id="xpText">0 XP</span>
          <span class="streak-chip" id="streakChip"></span>
        </div>
      </div>
    </div>

    <!-- TODAY -->
    <div class="view active" id="view-today">
      <div class="row-head"><h2>TODAY</h2><button class="icon-btn" id="editBtn">Edit</button></div>
      <div class="list" id="todayList"></div>
      <button class="add" id="addBtn">+ New habit</button>
    </div>

    <!-- CALENDAR -->
    <div class="view" id="view-cal">
      <div class="panel">
        <div class="cal-head"><button id="prevM">‹</button><div class="m" id="calMonth">—</div><button id="nextM">›</button></div>
        <div class="cal" id="calGrid"></div>
        <div class="legend">Less <i style="background:var(--ring-track)"></i><i style="background:var(--accent-weak)"></i><i style="background:color-mix(in srgb,var(--accent) 38%,transparent)"></i><i style="background:color-mix(in srgb,var(--accent) 65%,transparent)"></i><i style="background:var(--accent)"></i> More</div>
      </div>
      <div class="row-head"><h2>COMPLETION INTENSITY · how much you finished each day</h2></div>
    </div>

    <!-- STATS -->
    <div class="view" id="view-stats">
      <div class="stat-grid">
        <div class="stat"><div class="k">Longest streak</div><div class="v num" id="stLongest">0 <small>d</small></div></div>
        <div class="stat"><div class="k">Total completions</div><div class="v num" id="stTotal">0</div></div>
        <div class="stat"><div class="k">Last 30 days</div><div class="v num" id="stRate">0<small>%</small></div></div>
        <div class="stat"><div class="k">Level</div><div class="v num" id="stLevel">1</div></div>
      </div>
      <div class="panel"><h4>Last 14 days · completed habits</h4><div class="chart" id="chart"></div></div>
      <div class="panel"><h4>Success rate · last 30 days</h4><div class="ratebars" id="rateBars"></div></div>
    </div>

    <!-- BADGES -->
    <div class="view" id="view-badges">
      <div class="row-head"><h2>BADGES</h2><span class="num" id="badgeCount" style="font-size:13px;color:var(--accent);font-weight:600">0/0</span></div>
      <div class="badge-grid" id="badgeGrid"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="active" data-v="today"><span class="ic">◴</span>Today</button>
    <button data-v="cal"><span class="ic">▦</span>Calendar</button>
    <button data-v="stats"><span class="ic">◰</span>Stats</button>
    <button data-v="badges"><span class="ic">◆</span>Badges</button>
  </nav>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <h2>New habit</h2>
    <div class="seg" id="typeSeg"><button class="on" data-t="check">Done / not done</button><button data-t="count">Target count</button></div>
    <div class="field"><label>Name</label><input id="nameInput" type="text" placeholder="e.g. Drink water" maxlength="26" autocomplete="off"></div>
    <div class="row2" id="countFields">
      <div class="field"><label>Daily target</label><input id="targetInput" type="number" min="1" max="999" value="8"></div>
      <div class="field"><label>Unit</label><input id="unitInput" type="text" placeholder="glasses" maxlength="10"></div>
    </div>
    <div class="field"><label>Icon</label><div class="picker" id="emojiPicker"></div></div>
    <div class="field"><label>Color</label><div class="picker" id="colorPicker"></div></div>
    <button class="save" id="saveBtn">Add habit</button>
  </div>

  <div class="cele" id="cele"><div class="cele-card"><div class="ce" id="celeIcon">✦</div><h3 id="celeTitle"></h3><p id="celeText"></p></div></div>

<script>
const KEY='habit-quest-v1', THEME_KEY='habit-quest-theme';
const DSHORT=['Su','Mo','Tu','We','Th','Fr','Sa'];
const WD=['Mo','Tu','We','Th','Fr','Sa','Su'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const EMOJIS=['💧','📖','🏃','🧘','💪','🥗','😴','✍️','🎯','🎸','💊','🌱','🧹','☀️','📵','💰'];
const COLORS=['#E0796B','#6E8FE0','#6FB58E','#C792D8','#E0B15C','#7AC2C9','#D98AA8','#8A8FA3'];
const TITLES=[[1,'Rookie'],[3,'Keen'],[5,'Steady'],[8,'Disciplined'],[12,'Master'],[16,'Champion'],[20,'Legend']];

let habits=[],editing=false,calRef=new Date(),sel={type:'check',emoji:EMOJIS[0],color:COLORS[0]},prev={level:1,badges:new Set()};

const key=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseKey=k=>{const[y,m,dd]=k.split('-').map(Number);return new Date(y,m-1,dd);};
const TODAY=()=>key(new Date());
function lastDays(n){const o=[];for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);o.push(d);}return o;}

function valOf(h,k){return h.type==='count'?(h.history[k]||0):(h.history[k]?1:0);}
function isDone(h,k){return h.type==='count'?(h.history[k]||0)>=h.target:h.history[k]===true;}
function streakOf(h){let s=0;const d=new Date();if(!isDone(h,key(d)))d.setDate(d.getDate()-1);while(isDone(h,key(d))){s++;d.setDate(d.getDate()-1);}return s;}
function dayXp(run){return 10+Math.min((run-1)*2,20);}
function runLen(set,k){let len=1,d=parseKey(k);while(true){d.setDate(d.getDate()-1);if(set.has(key(d)))len++;else break;}return len;}
function compute(){let xp=0,longest=0,completions=0;for(const h of habits){const dk=Object.keys(h.history).filter(k=>isDone(h,k)).sort();const set=new Set(dk);completions+=dk.length;for(const k of dk){const len=runLen(set,k);if(len>longest)longest=len;xp+=dayXp(len);}}return{xp,longest,completions};}
function levelInfo(xp){let lvl=1,need=100,acc=0;while(xp>=acc+need){acc+=need;lvl++;need=100+(lvl-1)*50;}return{level:lvl,into:Math.floor(xp-acc),need,pct:(xp-acc)/need};}
function titleFor(l){let t='Rookie';for(const[x,n]of TITLES)if(l>=x)t=n;return t;}
function rate30(h){let d=0;lastDays(30).forEach(x=>{if(isDone(h,key(x)))d++;});return d/30;}

/* badges */
function goalDays(min){return habits.some(h=>h.type==='count'&&Object.keys(h.history).filter(k=>isDone(h,k)).length>=min);}
function hasBothTypes(){return habits.some(h=>h.type==='check')&&habits.some(h=>h.type==='count');}
function activeDaysCount(){const s=new Set();habits.forEach(h=>Object.keys(h.history).forEach(k=>{if(isDone(h,k))s.add(k);}));return s.size;}
function weekdaysCovered(){const s=new Set();habits.forEach(h=>Object.keys(h.history).forEach(k=>{if(isDone(h,k))s.add(parseKey(k).getDay());}));return s.size;}
function allDoneLongest(){const keys=new Set();habits.forEach(h=>Object.keys(h.history).forEach(k=>keys.add(k)));if(!habits.length||!keys.size)return 0;let d=parseKey([...keys].sort()[0]);const end=new Date();end.setHours(0,0,0,0);let run=0,longest=0;while(d<=end){if(habits.every(h=>isDone(h,key(d)))){run++;if(run>longest)longest=run;}else run=0;d.setDate(d.getDate()+1);}return longest;}
function hasPerfectWeekend(){const keys=new Set();habits.forEach(h=>Object.keys(h.history).forEach(k=>keys.add(k)));if(!habits.length||!keys.size)return false;let d=parseKey([...keys].sort()[0]);const end=new Date();end.setHours(0,0,0,0);while(d<=end){if(d.getDay()===6){const sat=key(d);const su=new Date(d);su.setDate(su.getDate()+1);const sun=key(su);if(habits.every(h=>isDone(h,sat))&&habits.every(h=>isDone(h,sun)))return true;}d.setDate(d.getDate()+1);}return false;}
function runsAtLeast(len){let count=0;habits.forEach(h=>{const dk=Object.keys(h.history).filter(k=>isDone(h,k)).sort();let prev=null,run=0;dk.forEach(k=>{if(prev===null){run=1;}else{const n=new Date(prev);n.setDate(n.getDate()+1);if(key(n)===k)run++;else{if(run>=len)count++;run=1;}}prev=parseKey(k);});if(run>=len)count++;});return count;}

/* persistence (localStorage) */
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(){try{localStorage.setItem(KEY,JSON.stringify(habits));}catch(e){console.error(e);}}
function seed(){
  const days=lastDays(30);
  const mk=(name,emoji,color,type,target,unit,fn)=>{const history={};days.forEach((d,i)=>{const v=fn(i,days.length);if(v!==null)history[key(d)]=v;});return{id:crypto.randomUUID(),name,emoji,color,type,target:target||1,unit:unit||'',history};};
  return [
    mk('Drink water','💧','#6E8FE0','count',8,'glasses',(i,n)=>n-i<=14?8:(Math.random()<.6?8:5)),
    mk('Read','📖','#C792D8','check',1,'',()=>Math.random()<.7?true:null),
    mk('Exercise','🏃','#E0796B','check',1,'',(i)=>i%2===0||Math.random()<.4?true:null),
    mk('Meditate','🧘','#6FB58E','check',1,'',(i,n)=>n-i<=9?true:(Math.random()<.5?true:null)),
  ];
}

/* render */
function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
const RING_LEN=232.5;
function renderHero(c){
  const li=levelInfo(c.xp);
  document.getElementById('lvlNum').textContent=li.level;
  document.getElementById('lvlWord').textContent='Level '+li.level;
  document.getElementById('lvlTitle').textContent=titleFor(li.level);
  document.getElementById('xpFill').style.width=(li.pct*100)+'%';
  document.getElementById('xpText').textContent=c.xp+' XP · '+(li.need-li.into)+' to next';
  const tk=TODAY(),total=habits.length,done=habits.filter(h=>isDone(h,tk)).length;
  document.getElementById('ringCount').textContent=done+'/'+total;
  const pct=total?done/total:0;
  document.getElementById('todayRing').style.strokeDashoffset=RING_LEN*(1-pct);
  const best=habits.reduce((m,h)=>Math.max(m,streakOf(h)),0);
  document.getElementById('streakChip').innerHTML=best>0?`🔥 <b>${best}</b> day streak`:'';
  return li;
}
function renderToday(){
  const list=document.getElementById('todayList');list.innerHTML='';
  if(!habits.length){list.innerHTML='<div class="empty"><div class="big">🌱</div><p>No habits yet. Add your first one and start earning XP.</p></div>';return;}
  const tk=TODAY(),week=lastDays(7);
  habits.forEach(h=>{
    const s=streakOf(h),done=isDone(h,tk),v=valOf(h,tk);
    const card=document.createElement('div');card.className='habit';
    card.style.setProperty('--c',h.color);card.style.setProperty('--c-weak',h.color+'24');
    let control;
    if(h.type==='count'){control=`<div class="counter"><button class="cbtn minus" data-id="${h.id}" data-d="-1">−</button><div class="cval ${done?'full':''}"><b>${v}</b>/${h.target}</div><button class="cbtn plus" data-id="${h.id}" data-d="1">+</button></div>`;}
    else{control=`<button class="check ${done?'done':''}" data-id="${h.id}"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></button>`;}
    card.innerHTML=`<button class="del" data-del="${h.id}">×</button><div class="h-top"><div class="h-emoji">${h.emoji}</div><div class="h-info"><h3>${esc(h.name)}</h3><div class="h-meta">${s>0?`<span class="fire">🔥 ${s}d</span>`:'<span>Start today</span>'}${h.type==='count'?`<span>· goal ${h.target} ${esc(h.unit||'')}</span>`:''}</div></div>${control}</div><div class="week">${week.map(d=>{const k=key(d),on=isDone(h,k),t=k===tk;return `<div class="day ${t?'today':''}"><span>${DSHORT[d.getDay()]}</span><div class="dot ${on?'on':''}"></div></div>`;}).join('')}</div>`;
    list.appendChild(card);
  });
}
function renderStats(c){
  const li=levelInfo(c.xp);
  document.getElementById('stLongest').innerHTML=`${c.longest} <small>d</small>`;
  document.getElementById('stTotal').textContent=c.completions;
  document.getElementById('stLevel').textContent=li.level;
  let r=0;if(habits.length){let t=0;habits.forEach(h=>t+=rate30(h));r=Math.round(t/habits.length*100);}
  document.getElementById('stRate').innerHTML=`${r}<small>%</small>`;
  const ch=document.getElementById('chart');ch.innerHTML='';const max=Math.max(1,habits.length);
  lastDays(14).forEach(d=>{const n=habits.filter(h=>isDone(h,key(d))).length;const col=document.createElement('div');col.className='col';col.innerHTML=`<div class="bar" style="height:${(n/max)*100}%"></div><small>${d.getDate()}</small>`;ch.appendChild(col);});
  const rb=document.getElementById('rateBars');rb.innerHTML='';
  if(!habits.length){rb.innerHTML='<div style="color:var(--muted);font-size:13px">Add a habit first.</div>';}
  habits.forEach(h=>{const p=Math.round(rate30(h)*100);const row=document.createElement('div');row.className='rate';row.style.setProperty('--c',h.color);row.innerHTML=`<div class="rl">${h.emoji} ${esc(h.name)}</div><div class="rt"><i style="width:${p}%"></i></div><div class="rp">${p}%</div>`;rb.appendChild(row);});
}
function renderCal(){
  const y=calRef.getFullYear(),m=calRef.getMonth();
  document.getElementById('calMonth').textContent=`${MONTHS[m]} ${y}`;
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  WD.forEach(w=>{const e=document.createElement('div');e.className='wd';e.textContent=w;grid.appendChild(e);});
  const first=(new Date(y,m,1).getDay()+6)%7,dim=new Date(y,m+1,0).getDate(),tk=TODAY();
  for(let i=0;i<first;i++)grid.appendChild(document.createElement('div'));
  for(let day=1;day<=dim;day++){const k=key(new Date(y,m,day));const total=habits.length,done=habits.filter(h=>isDone(h,k)).length,ratio=total?done/total:0;let lv=0;if(ratio>0)lv=ratio>=1?4:ratio>=.66?3:ratio>=.34?2:1;const cell=document.createElement('div');cell.className=`cell ${lv?'lv'+lv:''} ${k===tk?'today':''}`;cell.textContent=day;grid.appendChild(cell);}
}
function renderBadges(c){
  const defs=badgeDefs(c),grid=document.getElementById('badgeGrid');grid.innerHTML='';
  document.getElementById('badgeCount').textContent=`${defs.filter(b=>b.got).length}/${defs.length}`;
  defs.forEach(b=>{const el=document.createElement('div');el.className=`badge ${b.got?'unlocked':'locked'}`;el.innerHTML=`${b.got?'':'<span class="lock">🔒</span>'}<div class="medal">${b.icon}</div><h5>${b.name}</h5><p>${b.desc}</p>`;grid.appendChild(el);});
}
function renderAll(){const c=compute();const li=renderHero(c);c.level=li.level;renderToday();renderStats(c);renderCal();renderBadges(c);}

/* celebration */
function confettiBurst(){const cols=[getCSS('--accent'),getCSS('--flame'),getCSS('--muted')];for(let i=0;i<22;i++){const p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=cols[i%cols.length];p.style.animation=`fall ${1+Math.random()*1.1}s ease-in ${Math.random()*.25}s forwards`;document.body.appendChild(p);setTimeout(()=>p.remove(),2500);}}
function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function celebrate(icon,title,text){document.getElementById('celeIcon').textContent=icon;document.getElementById('celeTitle').textContent=title;document.getElementById('celeText').textContent=text;const c=document.getElementById('cele');c.classList.add('show');confettiBurst();clearTimeout(celebrate._t);celebrate._t=setTimeout(()=>c.classList.remove('show'),2000);}
function xpFloat(x,y,a){if(a<=0)return;const e=document.createElement('div');e.className='xpfloat';e.textContent='+'+a+' XP';e.style.left=(x-14)+'px';e.style.top=(y-10)+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),1050);}
function snapshot(){const c=compute();const lvl=levelInfo(c.xp).level;return{level:lvl,badges:new Set(badgeDefs({...c,level:lvl}).filter(b=>b.got).map(b=>b.id))};}

function act(fn,evt){
  const before=compute().xp,beforeSnap=prev;
  fn();save();renderAll();
  const after=compute();
  if(evt){const r=evt.getBoundingClientRect();xpFloat(r.left+r.width/2,r.top,after.xp-before);}
  const now=snapshot();
  if(now.level>beforeSnap.level)celebrate('✦','Level '+now.level,'You’re now '+titleFor(now.level));
  else{for(const id of now.badges){if(!beforeSnap.badges.has(id)){const b=badgeDefs({...after,level:now.level}).find(x=>x.id===id);if(b){celebrate(b.icon,'Badge unlocked',b.name);break;}}}}
  prev=now;
}

/* events */
document.getElementById('todayList').addEventListener('click',e=>{
  const chk=e.target.closest('.check');
  if(chk){const h=habits.find(x=>x.id===chk.dataset.id),tk=TODAY();const willDo=!h.history[tk];act(()=>{if(h.history[tk])delete h.history[tk];else h.history[tk]=true;},willDo?chk:null);if(willDo){chk.classList.add('pop');setTimeout(()=>chk.classList.remove('pop'),300);}return;}
  const cb=e.target.closest('.cbtn');
  if(cb){const h=habits.find(x=>x.id===cb.dataset.id),tk=TODAY(),d=+cb.dataset.d,wasDone=isDone(h,tk);act(()=>{let v=(h.history[tk]||0)+d;v=Math.max(0,Math.min(h.target,v));if(v===0)delete h.history[tk];else h.history[tk]=v;},(!wasDone&&d>0&&(h.history[tk]||0)+d>=h.target)?cb:null);return;}
  const del=e.target.closest('.del');
  if(del){habits=habits.filter(x=>x.id!==del.dataset.del);save();prev=snapshot();renderAll();return;}
});
/* drag-and-drop reordering (mouse + touch) */
(function(){
  const list=document.getElementById('todayList');
  const CTRL='.check,.cbtn,.del',GAP=10;
  let pending=null,dragging=false,dragEl=null,pid=null,lpTimer=null,isTouch=false;
  let startX=0,startY=0,slotH=0,fromIndex=0,toIndex=0,items=[],centers=[];
  function beginDrag(){
    clearTimeout(lpTimer);
    dragging=true;dragEl=pending;pending=null;
    items=[...list.querySelectorAll('.habit')];
    fromIndex=items.indexOf(dragEl);toIndex=fromIndex;
    const r=dragEl.getBoundingClientRect();slotH=r.height+GAP;
    centers=items.map(el=>{const b=el.getBoundingClientRect();return b.top+b.height/2;});
    dragEl.classList.add('dragging');document.body.classList.add('reordering');
    try{list.setPointerCapture(pid);}catch(_){}
    if(navigator.vibrate){try{navigator.vibrate(8);}catch(_){}}
  }
  function onDown(e){
    if(e.pointerType==='mouse'&&e.button!==0)return;
    const card=e.target.closest('.habit');
    if(!card||e.target.closest(CTRL))return;
    pending=card;pid=e.pointerId;isTouch=e.pointerType!=='mouse';
    startX=e.clientX;startY=e.clientY;
    if(isTouch)lpTimer=setTimeout(()=>{if(pending)beginDrag();},180);
  }
  function onMove(e){
    if(e.pointerId!==pid)return;
    const x=e.clientX,y=e.clientY;
    if(!dragging){
      if(!pending)return;
      const dx=Math.abs(x-startX),dy0=Math.abs(y-startY);
      if(isTouch){if(dx>10||dy0>10){clearTimeout(lpTimer);pending=null;}return;}
      if(dx>4||dy0>4)beginDrag();else return;
    }
    const dy=y-startY,dragCenter=centers[fromIndex]+dy;
    dragEl.style.transform=`translateY(${dy}px)`;
    let t=fromIndex;
    if(dy>0){for(let i=fromIndex+1;i<items.length;i++){if(dragCenter>centers[i])t=i;else break;}}
    else{for(let i=fromIndex-1;i>=0;i--){if(dragCenter<centers[i])t=i;else break;}}
    toIndex=t;
    items.forEach((el,i)=>{
      if(el===dragEl)return;
      let s=0;
      if(i>fromIndex&&i<=toIndex)s=-slotH;
      else if(i<fromIndex&&i>=toIndex)s=slotH;
      el.style.transform=s?`translateY(${s}px)`:'';
    });
  }
  function onUp(e){
    if(e.pointerId!==pid)return;
    clearTimeout(lpTimer);
    try{list.releasePointerCapture(pid);}catch(_){}
    if(dragging){
      items.forEach(el=>el.style.transform='');
      dragEl.classList.remove('dragging');document.body.classList.remove('reordering');
      if(toIndex!==fromIndex){const[m]=habits.splice(fromIndex,1);habits.splice(toIndex,0,m);save();renderAll();}
    }
    pending=null;dragging=false;dragEl=null;pid=null;items=[];
  }
  list.addEventListener('pointerdown',onDown);
  list.addEventListener('pointermove',onMove);
  list.addEventListener('pointerup',onUp);
  list.addEventListener('pointercancel',onUp);
  list.addEventListener('touchmove',e=>{if(dragging)e.preventDefault();},{passive:false});
})();

function buildPickers(){const ep=document.getElementById('emojiPicker');ep.innerHTML=EMOJIS.map(x=>`<button class="pick ${x===sel.emoji?'sel':''}" data-e="${x}">${x}</button>`).join('');const cp=document.getElementById('colorPicker');cp.innerHTML=COLORS.map(x=>`<button class="swatch ${x===sel.color?'sel':''}" data-c="${x}" style="background:${x}"></button>`).join('');ep.querySelectorAll('.pick').forEach(b=>b.onclick=()=>{sel.emoji=b.dataset.e;buildPickers();});cp.querySelectorAll('.swatch').forEach(b=>b.onclick=()=>{sel.color=b.dataset.c;buildPickers();});}
document.getElementById('typeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;sel.type=b.dataset.t;document.querySelectorAll('#typeSeg button').forEach(x=>x.classList.toggle('on',x===b));document.getElementById('countFields').classList.toggle('show',sel.type==='count');});
function openSheet(){sel={type:'check',emoji:EMOJIS[0],color:COLORS[Math.floor(Math.random()*COLORS.length)]};nameInput.value='';document.getElementById('targetInput').value=8;document.getElementById('unitInput').value='';document.querySelectorAll('#typeSeg button').forEach(x=>x.classList.toggle('on',x.dataset.t==='check'));document.getElementById('countFields').classList.remove('show');buildPickers();validate();scrim.classList.add('show');sheet.classList.add('show');setTimeout(()=>nameInput.focus(),250);}
function closeSheet(){scrim.classList.remove('show');sheet.classList.remove('show');}
function validate(){saveBtn.disabled=!nameInput.value.trim();}
nameInput.addEventListener('input',validate);
document.getElementById('addBtn').addEventListener('click',openSheet);
scrim.addEventListener('click',closeSheet);
saveBtn.addEventListener('click',()=>{const name=nameInput.value.trim();if(!name)return;habits.push({id:crypto.randomUUID(),name,emoji:sel.emoji,color:sel.color,type:sel.type,target:sel.type==='count'?Math.max(1,+document.getElementById('targetInput').value||1):1,unit:sel.type==='count'?document.getElementById('unitInput').value.trim():'',history:{}});save();prev=snapshot();renderAll();closeSheet();});

/* boot */
(function(){
  let t;try{t=localStorage.getItem(THEME_KEY);}catch(e){}
  if(!t)t='dark';
  applyTheme(t);
  const s=load();if(s)habits=s;else{habits=seed();save();}
  prev=snapshot();renderAll();
})();
</script>
</body>
</html>
